name: Feature Request
description: Suggest an idea or improvement
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for suggesting an improvement. A clear problem statement helps us evaluate requests.

  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What problem are you trying to solve? What is painful or missing today?
      placeholder: I'm always frustrated when ...
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: How would you like this to work?
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Any workarounds or other approaches you've thought about?
    validations:
      required: false

  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Redaction / detectors
        - Proxy / streaming
        - CLI / daemon
        - Local LLM fallback
        - Configuration
        - Documentation
        - Other
    validations:
      required: true
