name: Bug Report
description: Report something that isn't working as expected
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug. Please fill in as much detail as you can.

  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: A clear description of the bug.
      placeholder: Describe what went wrong.
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      description: Commands, config snippets, or request payloads that trigger the issue.
      placeholder: |
        1. Run `llmguard start`
        2. Send request with ...
        3. See error
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: llm-guard version or commit
      placeholder: e.g. v0.1.0 or abc1234
    validations:
      required: false

  - type: dropdown
    id: os
    attributes:
      label: Operating system
      options:
        - macOS
        - Linux
        - Windows
        - Other
    validations:
      required: true

  - type: input
    id: go-version
    attributes:
      label: Go version (if built from source)
      placeholder: e.g. go1.26.4
    validations:
      required: false

  - type: textarea
    id: logs
    attributes:
      label: Relevant logs or output
      description: Redact any real secrets before pasting.
      render: shell
    validations:
      required: false
